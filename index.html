<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blank Site</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: Arial, sans-serif;
    }

    .btn {
      padding: 14px 28px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #16a34a;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <button class="btn" onclick="openLink()">
    Open Template
  </button>

  <script>
    function openLink() {
      window.open("/doctorbasic.html", "_blank");
    }
  </script>

</body>
</html>
